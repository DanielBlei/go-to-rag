syntax = "proto3";

package rag.v1;

option go_package = "github.com/DanielBlei/go-to-rag/internal/gen/rag/v1;ragv1";

// ThinkMode controls whether and how the model reasons before answering.
enum ThinkMode {
  // THINK_MODE_UNSPECIFIED uses the model's default behaviour (usually enabled).
  // For qwen3, this means the model thinks and thinking tokens
  // are streamed back in AskResponse.thinking fields.
  THINK_MODE_UNSPECIFIED = 0;

  // THINK_MODE_DISABLED instructs the model to skip the reasoning step
  // entirely. Use this to reduce latency when chain-of-thought is not needed.
  THINK_MODE_DISABLED = 1;

  // THINK_MODE_HIDDEN lets the model reason internally but discards all
  // thinking tokens before they reach the response stream. The caller
  // receives only the final answer tokens.
  THINK_MODE_HIDDEN = 2;
}

// RAGService exposes the retrieval-augmented generation pipeline over gRPC.
service RAGService {
  // Ask queries the knowledge base and streams an LLM-generated answer
  // grounded in the retrieved context. Each response message carries a token
  // chunk so callers can display output incrementally or collect all chunks
  // and act on the full answer once the stream closes.
  rpc Ask(AskRequest) returns (stream AskResponse);

  // RetrieveChunks returns scored chunks from the vector store without
  // LLM generation. Designed for service-to-service use where the caller
  // handles generation.
  rpc RetrieveChunks(RetrieveChunksRequest) returns (RetrieveChunksResponse);

  // GetServerConfig returns the server's current defaults so callers can
  // understand what they get when optional fields are omitted.
  rpc GetServerConfig(GetServerConfigRequest) returns (GetServerConfigResponse);
}

message AskRequest {
  string question = 1;
  int32 top_k = 2;
  // think_mode overrides the server's default thinking behaviour for this
  // request. When absent, the server default (see GetServerConfig) is used.
  optional ThinkMode think_mode = 3;
}

message AskResponse {
  string answer = 1;
  string thinking = 2;
}

message RetrieveChunksRequest {
  string question = 1;
  int32 top_k = 2;
}

message RetrieveChunksResponse {
  repeated Chunk chunks = 1;
}

message Chunk {
  string text = 1;
  string source = 2;
  double score = 3;
  int32 chunk_index = 4;
}

message GetServerConfigRequest {}

message GetServerConfigResponse {
  // default_think_mode is the ThinkMode applied when a request omits think_mode.
  ThinkMode default_think_mode = 1;
}
